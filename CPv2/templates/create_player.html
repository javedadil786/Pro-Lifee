<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>PRO LIFE — Create Player</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

    <main class="menu-card comic-panel">

        <div class="comic-kicker">
            PRO LIFE
        </div>

        <h1 class="game-title">
            Start Your Career
        </h1>

        <p class="subtitle">
            Create your player and begin the journey from academy prospect
            to football superstar.
        </p>

        {% if error %}

            <div class="injury-box">
                {{ error }}
            </div>

        {% endif %}

        <form
            action="{{ url_for('create_player_page') }}"
            method="POST"
        >

            <label for="name">
                Player Name
            </label>

            <input
                id="name"
                type="text"
                name="name"
                placeholder="Enter player name"
                required
            >

            <label for="nationality">
                Nationality
            </label>

            <select
                id="nationality"
                name="nationality"
                required
            >

                <option value="England">England</option>
                <option value="France">France</option>
                <option value="Spain">Spain</option>
                <option value="Germany">Germany</option>
                <option value="Italy">Italy</option>
                <option value="Portugal">Portugal</option>
                <option value="Netherlands">Netherlands</option>
                <option value="Belgium">Belgium</option>
                <option value="Croatia">Croatia</option>
                <option value="Scotland">Scotland</option>
                <option value="Wales">Wales</option>

                <option value="Republic Of Ireland">
                    Republic Of Ireland
                </option>

                <option value="Brazil">Brazil</option>
                <option value="Argentina">Argentina</option>
                <option value="Uruguay">Uruguay</option>
                <option value="Colombia">Colombia</option>

                <option value="United States">
                    United States
                </option>

                <option value="Mexico">Mexico</option>
                <option value="Morocco">Morocco</option>
                <option value="Senegal">Senegal</option>
                <option value="Japan">Japan</option>

            </select>

            <label for="position">
                Position
            </label>

            <select
                id="position"
                name="position"
                required
            >

                <option value="Goalkeeper">
                    Goalkeeper
                </option>

                <option value="Defender">
                    Defender
                </option>

                <option value="Midfielder">
                    Midfielder
                </option>

                <option value="Winger">
                    Winger
                </option>

                <option value="Striker">
                    Striker
                </option>

            </select>

            <button
                class="menu-button primary comic-burst"
                type="submit"
            >
                Begin Career
            </button>

        </form>

        <div class="menu-buttons">

            <a
                class="menu-button"
                href="{{ url_for('home') }}"
            >
                Return Home
            </a>

        </div>

    </main>
<footer class="site-footer">
    <p>
        Join the PRO LIFE community
    </p>

    <a
        class="discord-link"
        href="https://discord.gg/knrfNj7t9c"
        target="_blank"
        rel="noopener noreferrer"
    >
        Join our Discord
    </a>
</footer>
</body>

</html>
